<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Renko Monitor</title>
  <style>
    :root { color-scheme: dark; --bg:#050708; --panel:#0b0f11; --line:#273036; --text:#d8dee2; --muted:#758087; --amber:#f2a900; --green:#20c997; --red:#ff4d5f; --blue:#4db2ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font:13px/1.35 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }
    header { height:42px; display:flex; align-items:center; gap:18px; padding:0 14px; background:var(--amber); color:#090909; border-bottom:1px solid #ffc84a; }
    h1 { margin:0; font-size:14px; letter-spacing:.08em; }
    .clock { margin-left:auto; font-weight:700; }
    .status { display:flex; align-items:center; gap:7px; font-weight:700; }
    .dot { width:7px; height:7px; border-radius:50%; background:#101010; }
    .status.offline .dot { background:var(--red); }
    .toolbar { height:34px; display:flex; align-items:center; gap:20px; padding:0 14px; background:var(--panel); border-bottom:1px solid var(--line); color:var(--muted); }
    .toolbar strong { color:var(--text); }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th { position:sticky; top:0; z-index:1; height:32px; padding:0 12px; background:#101518; color:var(--amber); border-bottom:1px solid var(--line); font-size:11px; font-weight:700; letter-spacing:.08em; text-align:right; }
    th:first-child, th:nth-child(4), th:nth-child(5) { text-align:left; }
    td { height:42px; padding:0 12px; border-bottom:1px solid #182025; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    td:first-child, td:nth-child(4), td:nth-child(5) { text-align:left; }
    tbody tr:hover { background:#10171a; }
    .symbol { color:#fff; font-weight:800; letter-spacing:.04em; }
    .tf { margin-left:7px; color:var(--muted); font-size:11px; }
    .up { color:var(--green); font-weight:800; }
    .down { color:var(--red); font-weight:800; }
    .position { font-weight:800; }
    .above { color:var(--green); }
    .below { color:var(--red); }
    .inside { color:var(--blue); }
    .muted { color:var(--muted); }
    .empty { padding:48px 14px; color:var(--muted); text-align:center; border-bottom:0; }
    footer { position:fixed; right:10px; bottom:8px; color:#4f5a60; font-size:10px; }
    @media (max-width:760px) { th,td { padding:0 7px; font-size:11px; } }
  </style>
</head>
<body>
  <header>
    <h1>RENKO MONITOR</h1>
    <div id="status" class="status offline"><span class="dot"></span><span>CONNECTING</span></div>
    <div id="clock" class="clock">--:--:--</div>
  </header>
  <div class="toolbar"><span>MARKET <strong>BINANCE FUTURES</strong></span><span>SYMBOLS <strong id="count">0</strong></span><span>FEED <strong>TRADINGVIEW</strong></span></div>
  <table>
    <thead><tr><th>SYMBOL</th><th>PRICE</th><th>LOWER</th><th>TREND</th><th>POSITION IN BRICK</th><th>UPPER</th><th>UPDATED</th></tr></thead>
    <tbody id="rows"><tr><td colspan="7" class="empty">WAITING FOR THE FIRST TRADINGVIEW ALERT</td></tr></tbody>
  </table>
  <footer>LOCAL RENKO TERMINAL</footer>
  <script>
    const rowsEl = document.getElementById("rows");
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const clockEl = document.getElementById("clock");
    const escapeHtml = (value) => String(value).replace(/[&<>'"]/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;" })[char]);
    function fmt(value) { if (!Number.isFinite(Number(value))) return "—"; return Number(value).toLocaleString(undefined, { maximumFractionDigits:8 }); }
    function age(timestamp) { if (!timestamp) return "—"; const seconds = Math.max(0, Math.floor((Date.now() - timestamp) / 1000)); if (seconds < 60) return `${seconds}s`; if (seconds < 3600) return `${Math.floor(seconds / 60)}m`; return `${Math.floor(seconds / 3600)}h`; }
    function render(rows) {
      countEl.textContent = rows.length;
      if (!rows.length) { rowsEl.innerHTML = '<tr><td colspan="7" class="empty">WAITING FOR THE FIRST TRADINGVIEW ALERT</td></tr>'; return; }
      rowsEl.innerHTML = rows.map((row) => {
        const trendClass = row.direction === 1 ? "up" : "down";
        const trend = row.direction === 1 ? "▲ UP" : "▼ DOWN";
        const positionClass = row.position === "ABOVE" ? "above" : row.position === "BELOW" ? "below" : "inside";
        const pct = Number.isFinite(row.positionPct) ? `${row.positionPct.toFixed(1)}%` : "—";
        return `<tr><td><span class="symbol">${escapeHtml(row.symbol)}</span><span class="tf">${escapeHtml(row.timeframe || "")}</span></td><td>${fmt(row.price)}</td><td class="muted">${fmt(row.lower)}</td><td class="${trendClass}">${trend}</td><td class="position ${positionClass}">${escapeHtml(row.position)} <span class="muted">${pct}</span></td><td class="muted">${fmt(row.upper)}</td><td class="muted">${age(row.updatedAt)}</td></tr>`;
      }).join("");
    }
    async function load() { try { const response = await fetch("/api/state"); render(await response.json()); } catch {} }
    load();
    const events = new EventSource("/events");
    events.addEventListener("update", (event) => { statusEl.classList.remove("offline"); statusEl.lastElementChild.textContent = "LIVE"; render(JSON.parse(event.data)); });
    events.onerror = () => { statusEl.classList.add("offline"); statusEl.lastElementChild.textContent = "OFFLINE"; };
    setInterval(() => { clockEl.textContent = new Date().toLocaleTimeString([], { hour12:false }); }, 1000);
    setInterval(() => load(), 30000);
  </script>
</body>
</html>
