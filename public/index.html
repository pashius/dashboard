<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Renko Dashboard</title>
  <style>
    body { font-family: -apple-system, system-ui, Arial; margin: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    th { position: sticky; top: 0; background: #fff; }
    .bullish { color: #0a7a2f; font-weight: 600; }
    .bearish { color: #b00020; font-weight: 600; }
    .neutral { color: #666; font-weight: 600; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #f3f3f3; }
    .high { background: #e6ffed; }
    .normal { background: #fff7e6; }
    .low { background: #ffecec; }
    .muted { color: #777; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Renko Dashboard</h2>
  <div class="muted" id="status">connecting</div>
  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Price</th>
        <th>Renko Close</th>
        <th>Trend</th>
        <th>Price/Trend</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const rowsEl = document.getElementById("rows");
    const statusEl = document.getElementById("status");

    function fmt(n) {
      if (n === null || n === undefined || Number.isNaN(n)) return "-";
      const x = Number(n);
      if (!Number.isFinite(x)) return "-";
      return x.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function render(rows) {
      rowsEl.innerHTML = rows.map(r => {
        const v1cls = r.verdict1 || "neutral";
        const v2cls = r.verdict2 || "";
        return `
          <tr>
            <td>${r.symbol}</td>
            <td>${fmt(r.price)}</td>
            <td>${fmt(r.renkoClose)}</td>
            <td class="${v1cls}">${r.verdict1}</td>
            <td><span class="pill ${v2cls}">${r.verdict2}</span></td>
          </tr>
        `;
      }).join("");
    }

    async function loadOnce() {
      const r = await fetch("/api/state");
      const data = await r.json();
      render(data);
    }

    loadOnce();

    const es = new EventSource("/events");
    es.addEventListener("update", (ev) => {
      statusEl.textContent = "live";
      render(JSON.parse(ev.data));
    });
    es.onerror = () => {
      statusEl.textContent = "disconnected";
    };
  </script>
</body>
</html>
